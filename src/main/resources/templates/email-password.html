<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha | Brevus Commerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen transition-colors duration-300">

<div class="fixed top-5 right-5">
  <button id="theme-toggle" class="p-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all shadow-sm">
    <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon"></i>
    <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun"></i>
  </button>
</div>

<div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 dark:border-slate-700 transition-colors">

  <div class="text-center mb-8">
    <div class="bg-indigo-100 dark:bg-indigo-900/30 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
      <i class="fa-solid fa-key text-indigo-600 dark:text-indigo-400 text-2xl"></i>
    </div>
    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Recuperar Senha</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Insira seu e-mail e enviaremos um link para você redefinir sua senha.</p>
  </div>

  <form id="recoveryForm" class="space-y-6">
    <div>
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">E-mail cadastrado</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
          <i class="fa-solid fa-envelope text-sm"></i>
        </span>
        <input type="email" id="email" name="email" required
               class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all placeholder:text-slate-400"
               placeholder="exemplo@email.com">
      </div>
    </div>

    <div id="errorMessage" class="hidden p-4 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm"></div>
    <div id="successMessage" class="hidden p-4 rounded-lg bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800 text-emerald-700 dark:text-emerald-400 text-sm text-center">
      <i class="fa-solid fa-circle-check mr-2"></i> Link enviado com sucesso! Verifique sua caixa de entrada.
    </div>

    <button type="submit" id="submitBtn"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 dark:shadow-none disabled:opacity-50 disabled:cursor-not-allowed">
      Enviar Link de Recuperação
    </button>
  </form>

  <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700 text-center">
    <a href="/api/web/login" class="text-slate-600 dark:text-slate-400 text-sm hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors flex items-center justify-center gap-2">
      <i class="fa-solid fa-arrow-left text-xs"></i>
      Voltar para o Login
    </a>
  </div>
</div>

<script>
  const recoveryForm = document.getElementById('recoveryForm');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');
  const successMessage = document.getElementById('successMessage');

  recoveryForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    // Reset de estado
    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';
    errorMessage.classList.add('hidden');
    successMessage.classList.add('hidden');

    try {
      // Ajuste o endpoint conforme seu backend (ex: /api/auth/forgot-password)
      const response = await fetch('/api/users/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailInput.value })
      });

      if (response.ok) {
        successMessage.classList.remove('hidden');
        recoveryForm.reset();
      } else {
        const text = await response.text();
        showError(text || 'Não foi possível encontrar uma conta com este e-mail.');
      }
    } catch (error) {
      showError('Erro ao conectar ao servidor. Tente novamente mais tarde.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Enviar Link de Recuperação';
    }
  });

  function showError(msg) {
    errorMessage.textContent = msg;
    errorMessage.classList.remove('hidden');
  }

  // Lógica de Dark Mode (Consistente com suas outras telas)
  const themeToggleBtn = document.getElementById('theme-toggle');
  const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
  const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

  if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      themeToggleLightIcon.classList.remove('hidden');
  } else {
      document.documentElement.classList.remove('dark');
      themeToggleDarkIcon.classList.remove('hidden');
  }

  themeToggleBtn.addEventListener('click', function() {
      themeToggleDarkIcon.classList.toggle('hidden');
      themeToggleLightIcon.classList.toggle('hidden');
      if (document.documentElement.classList.contains('dark')) {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('color-theme', 'light');
      } else {
          document.documentElement.classList.add('dark');
          localStorage.setItem('color-theme', 'dark');
      }
  });
</script>
</body>
</html>
