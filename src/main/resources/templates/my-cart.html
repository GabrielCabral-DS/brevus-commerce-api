<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Seguro | Brevus Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/js/auth-utils.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }

        if (!AuthUtils.isAuthenticated() || !AuthUtils.hasRole('CLIENT')) {
            window.location.href = '/api/web/login';
        }

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-800 dark:text-slate-200 antialiased transition-colors duration-300">

<div class="max-w-7xl mx-auto px-4 py-8 md:py-12">

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-bold tracking-tight dark:text-white">Finalizar Pedido</h1>
            <a href="/api/web/products-client" class="text-blue-600 dark:text-blue-400 hover:underline flex items-center gap-1 mt-2 text-sm font-medium">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Continuar Comprando
            </a>
        </div>

        <button id="theme-toggle" class="p-2 rounded-lg bg-gray-200 dark:bg-slate-800 hover:ring-2 ring-blue-500 transition-all">
            <i data-lucide="sun" id="theme-toggle-light-icon" class="hidden w-5 h-5 text-yellow-500"></i>
            <i data-lucide="moon" id="theme-toggle-dark-icon" class="w-5 h-5 text-slate-700 dark:text-blue-400"></i>
        </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">

        <main class="lg:col-span-8 space-y-8">

            <div class="bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-gray-100 dark:border-slate-800 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-50 dark:bg-slate-800/50 border-b border-gray-100 dark:border-slate-800">
                        <tr>
                            <th class="p-4 font-semibold text-sm uppercase tracking-wider">Produto</th>
                            <th class="p-4 font-semibold text-sm uppercase tracking-wider text-center">Qtd</th>
                            <th class="p-4 font-semibold text-sm uppercase tracking-wider text-right">Preço</th>
                            <th class="p-4"></th>
                        </tr>
                        </thead>
                        <tbody id="cartItemsBody" class="divide-y divide-gray-100 dark:divide-slate-800"></tbody>
                    </table>
                </div>
            </div>

            <div class="p-6 bg-white dark:bg-slate-900 rounded-xl border border-gray-100 dark:border-slate-800 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold dark:text-white flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-5 h-5 text-blue-600"></i> Endereço de Entrega
                    </h3>
                    <a href="/api/web/profile-client" class="text-sm font-bold text-blue-600 hover:underline flex items-center gap-1">
                        <i data-lucide="plus" class="w-3 h-3"></i> Adicionar Endereço
                    </a>
                </div>

                <div id="addressContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p class="text-sm text-slate-500 col-span-2 py-4">Carregando seus endereços...</p>
                </div>
            </div>

            <div class="p-6 bg-white dark:bg-slate-900 rounded-xl border border-gray-100 dark:border-slate-800 shadow-sm">
                <h3 class="text-lg font-bold dark:text-white flex items-center gap-2 mb-6">
                    <i data-lucide="credit-card" class="w-5 h-5 text-blue-600"></i> Forma de Pagamento
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div onclick="selectPayment('pix')" id="pay-pix" class="payment-card cursor-pointer p-4 rounded-xl border-2 border-gray-100 dark:border-slate-800 hover:border-blue-300 transition-all flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-lg flex items-center justify-center">
                            <i data-lucide="qr-code" class="w-6 h-6"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-sm dark:text-white">PIX</p>
                            <p class="text-[10px] text-slate-500 uppercase font-black">Imediato</p>
                        </div>
                        <i data-lucide="check-circle-2" class="check-icon-pay w-5 h-5 text-transparent"></i>
                    </div>
                    <div onclick="selectPayment('card')" id="pay-card" class="payment-card cursor-pointer p-4 rounded-xl border-2 border-gray-100 dark:border-slate-800 hover:border-blue-300 transition-all flex items-center gap-4">
                        <div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-lg flex items-center justify-center">
                            <i data-lucide="credit-card" class="w-6 h-6"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-sm dark:text-white">Cartão</p>
                            <p class="text-[10px] text-slate-500 uppercase font-black">Até 12x</p>
                        </div>
                        <i data-lucide="check-circle-2" class="check-icon-pay w-5 h-5 text-transparent"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="p-6 bg-white dark:bg-slate-900 rounded-xl border border-gray-100 dark:border-slate-800 shadow-sm">
                    <label class="block text-sm font-semibold mb-3 dark:text-slate-300">Cupom de Desconto</label>
                    <div class="flex gap-2">
                        <input type="text" placeholder="Código" class="flex-1 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <button class="bg-slate-800 dark:bg-blue-600 text-white px-6 py-2 rounded-lg hover:opacity-90 transition font-medium text-sm">Aplicar</button>
                    </div>
                </div>
                <div class="p-6 bg-white dark:bg-slate-900 rounded-xl border border-gray-100 dark:border-slate-800 shadow-sm">
                    <label class="block text-sm font-semibold mb-3 dark:text-slate-300">Calcular Frete</label>
                    <div class="flex gap-2">
                        <input type="text" placeholder="00000-000" class="flex-1 bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <button class="bg-white dark:bg-slate-800 border border-gray-300 dark:border-slate-700 px-6 py-2 rounded-lg hover:bg-gray-50 transition font-medium text-sm">Calcular</button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="lg:col-span-4">
            <div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-gray-100 dark:border-slate-800 p-8 sticky top-6">
                <h2 class="text-xl font-bold mb-6 pb-4 border-b border-gray-50 dark:border-slate-800 dark:text-white">Resumo do Pedido</h2>

                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-gray-500 dark:text-slate-400 font-medium">
                        <span>Subtotal</span>
                        <span class="subtotal-value">R$ 0,00</span>
                    </div>
                    <div class="flex justify-between text-gray-500 dark:text-slate-400 font-medium">
                        <span>Frete</span>
                        <span class="text-green-600 dark:text-green-400 font-bold">Grátis</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black text-gray-900 dark:text-white pt-6 border-t border-gray-100 dark:border-slate-800">
                        <span>Total</span>
                        <span class="total-value text-blue-600 dark:text-blue-400">R$ 0,00</span>
                    </div>
                </div>

                <button onclick="checkout()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold text-lg transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                    <i data-lucide="shield-check" class="w-5 h-5"></i> Finalizar Compra
                </button>
            </div>
        </aside>
    </div>
</div>

<script>
    let selectedAddressId = null;

    // --- TEMA ---
    const htmlElement = document.documentElement;
    const themeToggleBtn = document.getElementById('theme-toggle');

    function updateThemeIcons() {
        const isDark = htmlElement.classList.contains('dark');
        document.getElementById('theme-toggle-light-icon').classList.toggle('hidden', !isDark);
        document.getElementById('theme-toggle-dark-icon').classList.toggle('hidden', isDark);
    }
    themeToggleBtn.addEventListener('click', () => {
        htmlElement.classList.toggle('dark');
        localStorage.setItem('color-theme', htmlElement.classList.contains('dark') ? 'dark' : 'light');
        updateThemeIcons();
    });
    updateThemeIcons();

    // --- RENDERIZAÇÃO PRODUTOS ---
    function renderCheckout() {
        const cart = JSON.parse(localStorage.getItem('brevus_cart')) || [];
        const tbody = document.getElementById('cartItemsBody');

        if (cart.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="p-16 text-center text-gray-400">Carrinho vazio</td></tr>`;
            updateTotals(0);
            return;
        }

        let totalGeral = 0;
        tbody.innerHTML = cart.map(item => {
            const subtotal = item.price * item.quantity;
            totalGeral += subtotal;
            return `
                <tr class="hover:bg-gray-50/50 dark:hover:bg-slate-800/30 transition-colors">
                    <td class="p-4 flex items-center gap-4">
                        <img src="${item.imageUrl || item.imagePath || 'https://via.placeholder.com/80'}" class="w-16 h-16 object-cover rounded-lg bg-gray-50 dark:bg-slate-800">
                        <div><h3 class="font-bold text-gray-900 dark:text-white">${item.name}</h3></div>
                    </td>
                    <td class="p-4">
                        <div class="flex items-center border border-gray-200 dark:border-slate-700 rounded-lg w-fit mx-auto bg-white dark:bg-slate-950 overflow-hidden">
                            <button onclick="updateQty('${item.id}', -1)" class="px-3 py-1 hover:bg-gray-100 dark:hover:bg-slate-800">-</button>
                            <span class="px-4 py-1 text-sm font-bold border-x border-gray-100 dark:border-slate-800">${item.quantity}</span>
                            <button onclick="updateQty('${item.id}', 1)" class="px-3 py-1 hover:bg-gray-100 dark:hover:bg-slate-800">+</button>
                        </div>
                    </td>
                    <td class="p-4 font-black text-right text-gray-900 dark:text-white">R$ ${subtotal.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td class="p-4 text-right">
                        <button onclick="removeItem('${item.id}')" class="text-gray-400 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5 ml-auto"></i></button>
                    </td>
                </tr>`;
        }).join('');
        updateTotals(totalGeral);
        lucide.createIcons();
    }

    // --- LÓGICA ENDEREÇOS REFATORADA ---
async function loadAddresses() {
    const container = document.getElementById('addressContainer');
    const userInfo = AuthUtils.getUserInfo();
    const userId = userInfo?.id;

    if (!userId) {
        container.innerHTML = `<p class="text-amber-500 text-sm italic text-center col-span-full">Usuário não autenticado.</p>`;
        return;
    }

    try {

        const res = await AuthUtils.authenticatedFetch(`/api/address/${userId}`);

        if (res.status === 401) {
            container.innerHTML = `<p class="text-red-500 text-sm text-center col-span-full">Sessão expirada. Por favor, faça login novamente.</p>`;
            return;
        }

        if (!res.ok) throw new Error("Erro na resposta do servidor");

        const addresses = await res.json();

        if (!addresses || addresses.length === 0) {
            container.innerHTML = `
                <div class="col-span-full p-8 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-2xl text-center">
                    <p class="text-slate-500 mb-4 text-sm">Nenhum endereço cadastrado para entrega.</p>
                    <a href="/api/web/profile-client" class="inline-block bg-blue-600 text-white px-6 py-2 rounded-lg font-bold text-sm">Cadastrar Agora</a>
                </div>`;
            return;
        }

        container.innerHTML = addresses.map(addr => `
            <div onclick="selectAddress('${addr.id}')" id="addr-${addr.id}"
                 class="address-card cursor-pointer p-4 rounded-xl border-2 transition-all duration-200
                 ${addr.main ? 'border-blue-500 bg-blue-50/30 dark:bg-blue-900/10' : 'border-gray-100 dark:border-slate-800 hover:border-blue-300'}">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[10px] font-black uppercase tracking-wider ${addr.main ? 'text-blue-600' : 'text-slate-400'}">
                        ${addr.main ? 'Principal' : 'Entrega'}
                    </span>
                    <i data-lucide="check-circle-2" class="w-4 h-4 check-icon ${addr.main ? 'text-blue-600' : 'text-transparent'}"></i>
                </div>
                <p class="text-sm font-bold dark:text-white">${addr.street}, ${addr.number}</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">${addr.complement ? addr.complement + ' • ' : ''}${addr.neighborhood}</p>
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">${addr.city.replace('_', ' ')} / ${addr.state} — ${addr.zipCode}</p>
            </div>
        `).join('');

        const mainAddr = addresses.find(a => a.main) || addresses[0];
        if (mainAddr) selectAddress(mainAddr.id);

        lucide.createIcons();
    } catch (e) {
        console.error("Erro ao carregar endereços:", e);
        container.innerHTML = `<p class="text-red-500 text-xs text-center col-span-full">Erro técnico ao carregar endereços.</p>`;
    }
}

    function selectAddress(id) {
    selectedAddressId = id;

    // Remove estilos de todos
    document.querySelectorAll('.address-card').forEach(card => {
        card.classList.remove('border-blue-500', 'bg-blue-50/30', 'dark:bg-blue-900/10');
        card.classList.add('border-gray-100', 'dark:border-slate-800');

        const icon = card.querySelector('.check-icon');
        if (icon) {
            icon.classList.add('text-transparent');
            icon.classList.remove('text-blue-600');
        }
    });

    // Adiciona estilo ao selecionado
    const selected = document.getElementById(`addr-${id}`);
    if (selected) {
        selected.classList.remove('border-gray-100', 'dark:border-slate-800');
        selected.classList.add('border-blue-500', 'bg-blue-50/30', 'dark:bg-blue-900/10');

        const icon = selected.querySelector('.check-icon');
        if (icon) {
            icon.classList.remove('text-transparent');
            icon.classList.add('text-blue-600');
        }
    }
}

    // --- FUNÇÕES AUXILIARES ---
    function updateTotals(total) {
        document.querySelectorAll('.subtotal-value, .total-value').forEach(el => {
            el.textContent = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;
        });
    }

    function updateQty(id, delta) {
        let cart = JSON.parse(localStorage.getItem('brevus_cart')) || [];
        const index = cart.findIndex(i => i.id == id);
        if (index > -1) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) return removeItem(id);
            localStorage.setItem('brevus_cart', JSON.stringify(cart));
            renderCheckout();
        }
    }

    function removeItem(id) {
        let cart = JSON.parse(localStorage.getItem('brevus_cart')) || [];
        cart = cart.filter(i => i.id != id);
        localStorage.setItem('brevus_cart', JSON.stringify(cart));
        renderCheckout();
    }

    let selectedPaymentMethod = 'pix';

    function selectPayment(method) {
        selectedPaymentMethod = method;
        document.querySelectorAll('.payment-card').forEach(card => {
            const icon = card.querySelector('.check-icon-pay');
            if (icon) icon.classList.add('text-transparent');
        });
        const selected = document.getElementById(`pay-${method}`);
        if (selected) {
            const icon = selected.querySelector('.check-icon-pay');
            if (icon) icon.classList.remove('text-transparent');
        }
    }

    async function checkout() {
        // 1. Validações Iniciais
        if (!selectedAddressId) {
            alert("Por favor, selecione um endereço de entrega.");
            return;
        }

        const cart = JSON.parse(localStorage.getItem('brevus_cart')) || [];
        if (cart.length === 0) {
            alert("Seu carrinho está vazio.");
            return;
        }

        const userInfo = AuthUtils.getUserInfo();
        if (!userInfo || !userInfo.id) {
            alert("Sessão inválida. Por favor, faça login novamente.");
            AuthUtils.logout();
            return;
        }

        // 2. Montagem do Objeto de Venda (Sale)
        const saleData = {
            clientId: userInfo.id,
            addressId: selectedAddressId,
            items: cart.map(item => ({
                productId: item.id,
                quantity: item.quantity,
                unitPrice: item.price,
                subtotal: item.price * item.quantity
            }))
        };

        try {
            // Exibir um loading opcional no botão
            const btn = event.target.closest('button');
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-spin inline-block">⏳</span> Processando...';

            // 3. Chamada para criar a venda
            const saleResponse = await AuthUtils.authenticatedFetch('/api/sales', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(saleData)
            });

            if (saleResponse.status === 401) {
                throw new Error("Sua sessão expirou ou você não tem permissão para realizar compras.");
            }

            if (!saleResponse.ok) {
                const errorText = await saleResponse.text();
                throw new Error(errorText || "Erro ao criar pedido.");
            }

            const saleCreated = await saleResponse.json();
            const saleId = saleCreated.id;

            // 4. Se PIX foi selecionado, gerar QR Code
            if (selectedPaymentMethod === 'pix') {
                const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

                // Dados para gerar QR Code PIX
                const pixPayload = {
                    valor: totalAmount.toFixed(2),
                    chave: "9644bbe4-8fed-40ee-b58d-21460b8f7d7d",
                    pixInfoPayment: {
                        cpfPagador: userInfo.cpf || "12345678909",
                        nomePagador: userInfo.name || userInfo.email,
                        descricaoProduto: "sale",
                        valorProduto: saleId
                    }
                };

                const pixResponse = await AuthUtils.authenticatedFetch('/api/pix', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pixPayload)
                });

                if (pixResponse.ok) {
                    const qrCodeData = await pixResponse.json();
                    localStorage.removeItem('brevus_cart');
                    // Redirecionar para página de PIX com QR Code
                    window.location.href = `/api/web/pix?saleId=${saleId}&qrCode=${encodeURIComponent(JSON.stringify(qrCodeData))}`;
                } else {
                    throw new Error("Erro ao gerar QR Code PIX");
                }
            } else {
                // Redirecionar para página de pagamento com cartão
                localStorage.removeItem('brevus_cart');
                window.location.href = `/api/web/payment?saleId=${saleId}`;
            }

        } catch (error) {
            console.error("Erro no checkout:", error);
            alert("Falha ao finalizar pedido: " + error.message);

            // Restaurar botão
            const btn = document.querySelector('button[onclick="checkout()"]');
            btn.disabled = false;
            btn.innerHTML = `<i data-lucide="shield-check" class="w-5 h-5"></i> Finalizar Compra`;
            lucide.createIcons();
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderCheckout();
        loadAddresses();
    });
</script>
</body>
</html>
