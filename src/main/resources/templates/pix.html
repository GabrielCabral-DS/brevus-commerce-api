<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX | Brevus Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Script de inicialização para evitar "flash" de tema claro
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 transition-colors duration-300">

<button id="theme-toggle" class="fixed top-6 right-6 p-3 rounded-full bg-white dark:bg-slate-800 shadow-lg border border-slate-200 dark:border-slate-700 hover:scale-110 transition-all">
    <i data-lucide="sun" id="theme-toggle-light-icon" class="hidden text-yellow-500"></i>
    <i data-lucide="moon" id="theme-toggle-dark-icon" class="hidden text-blue-400"></i>
</button>

<div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 bg-white dark:bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-800">

    <div class="p-8 md:p-12 border-b md:border-b-0 md:border-r border-slate-100 dark:border-slate-800">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-teal-500 p-2 rounded-lg text-white">
                <i data-lucide="qr-code" class="w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tight leading-none">Pagamento PIX</h1>
                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">ID: <span th:text="${pix.txid}">TXID</span></span>
            </div>
        </div>

        <div class="space-y-8">
            <div>
                <label class="text-[10px] uppercase font-black text-slate-400 tracking-widest block mb-1">Devedor</label>
                <p class="font-bold text-xl dark:text-white" th:text="${pix.devedorNome}">Gabriel</p>
                <p class="text-sm text-slate-500 font-medium" th:text="${pix.devedorCpf}">***.456.***-09</p>
            </div>

            <div>
                <label class="text-[10px] uppercase font-black text-slate-400 tracking-widest block mb-1">Valor Total</label>
                <p class="text-4xl font-black text-teal-600 dark:text-teal-400 tracking-tight"
                   th:text="'R$ ' + ${pix.valor}">R$ 0,00</p>
            </div>

            <div class="flex items-center gap-3 bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                <div class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </div>
                <span class="text-sm font-bold uppercase tracking-wide text-slate-600 dark:text-slate-300">
                        Aguardando Pagamento
                    </span>
            </div>

            <div class="pt-6 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
                <div class="flex items-center gap-2 text-xs text-slate-500">
                    <i data-lucide="clock-alert" class="w-4 h-4"></i>
                    <span>Expira em 30 min</span>
                </div>
                <img src="https://logopng.com.br/logos/pix-106.png" class="h-4 opacity-50 dark:brightness-200">
            </div>
        </div>
    </div>

    <div class="p-8 md:p-12 bg-slate-50/50 dark:bg-slate-900/30 flex flex-col items-center justify-center text-center">

        <div class="relative group mb-8">
            <div class="absolute -inset-2 bg-teal-500/20 rounded-3xl blur-xl opacity-0 group-hover:opacity-100 transition duration-500"></div>

            <div class="relative bg-white p-5 rounded-2xl shadow-xl border border-slate-200">
                <img th:src="'data:image/png;base64,' + ${qrCodeBase64}"
                     alt="QR Code PIX"
                     class="w-48 h-48 md:w-56 md:h-56">
            </div>
        </div>

        <p class="text-sm font-medium text-slate-500 dark:text-slate-400 mb-8 max-w-[250px]">
            Escaneie o código com o aplicativo do seu banco
        </p>

        <div class="w-full space-y-4">
            <div class="relative group">
                <input type="text" readonly id="pixCode"
                       th:value="${pix.pixCopiaECola}"
                       class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl px-5 py-4 text-xs font-mono pr-14 focus:outline-none shadow-sm group-hover:border-teal-500/50 transition-colors">

                <button onclick="copyPixCode()"
                        class="absolute right-3 top-1/2 -translate-y-1/2 p-2 bg-slate-100 dark:bg-slate-700 hover:bg-teal-500 hover:text-white rounded-xl transition-all shadow-sm"
                        title="Copiar Código">
                    <i data-lucide="copy" class="w-4 h-4" id="copyIcon"></i>
                    <i data-lucide="check" class="w-4 h-4 hidden" id="checkIcon"></i>
                </button>
            </div>

            <p id="copyStatus" class="text-xs font-bold text-teal-600 dark:text-teal-400 opacity-0 transition-opacity uppercase tracking-widest">
                Copiado para área de transferência!
            </p>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // LÓGICA DE TEMA
    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    function toggleThemeIcons() {
        if (document.documentElement.classList.contains('dark')) {
            lightIcon.classList.remove('hidden');
            darkIcon.classList.add('hidden');
        } else {
            darkIcon.classList.remove('hidden');
            lightIcon.classList.add('hidden');
        }
    }
    toggleThemeIcons();

    themeToggleBtn.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
        toggleThemeIcons();
    });

    // LÓGICA DE COPIAR
    function copyPixCode() {
        const copyText = document.getElementById("pixCode");
        const copyIcon = document.getElementById("copyIcon");
        const checkIcon = document.getElementById("checkIcon");
        const statusText = document.getElementById("copyStatus");

        copyText.select();
        navigator.clipboard.writeText(copyText.value);

        // UI Feedback
        copyIcon.classList.add('hidden');
        checkIcon.classList.remove('hidden');
        statusText.classList.replace('opacity-0', 'opacity-100');

        setTimeout(() => {
            copyIcon.classList.remove('hidden');
            checkIcon.classList.add('hidden');
            statusText.classList.replace('opacity-100', 'opacity-0');
        }, 2500);
    }
</script>
</body>
</html>
