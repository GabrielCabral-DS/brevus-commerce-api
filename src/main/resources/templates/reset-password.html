<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Senha | Brevus Commerce</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen transition-colors duration-300">

<div class="fixed top-5 right-5">
  <button id="theme-toggle" class="p-2.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all shadow-sm">
    <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon"></i>
    <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun"></i>
  </button>
</div>

<div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100 dark:border-slate-700">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-slate-800 dark:text-white">Redefinir Senha</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Crie uma nova senha forte para sua conta.</p>
  </div>

  <form id="resetForm" class="space-y-5">
    <input type="hidden" id="token" name="token">

    <div>
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Nova Senha</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
          <i class="fa-solid fa-lock text-sm"></i>
        </span>
        <input type="password" id="password" required
               class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
               placeholder="••••••••">
      </div>
      <p class="text-[10px] text-slate-500 mt-1 italic leading-tight">
        Mín. 8 caracteres: 1 maiúscula, 1 minúscula, 1 número e 1 especial.
      </p>
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1">Confirmar Nova Senha</label>
      <div class="relative">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
          <i class="fa-solid fa-shield-halved text-sm"></i>
        </span>
        <input type="password" id="passwordConfirmation" required
               class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
               placeholder="••••••••">
      </div>
    </div>

    <div id="errorMessage" class="hidden p-4 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-400 text-sm"></div>

    <button type="submit" id="submitBtn"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 dark:shadow-none">
      Atualizar Senha
    </button>
  </form>
</div>

<script>
  // 1. Captura o token da URL assim que a página carrega
  const urlParams = new URLSearchParams(window.location.search);
  const tokenFromUrl = urlParams.get('token');
  document.getElementById('token').value = tokenFromUrl;

  const resetForm = document.getElementById('resetForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMessage = document.getElementById('errorMessage');

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const passwordConfirmation = document.getElementById('passwordConfirmation').value;
    const token = document.getElementById('token').value;

    if (!token) {
      showError('Token de recuperação ausente. Solicite um novo e-mail.');
      return;
    }

    if (password !== passwordConfirmation) {
      showError('As senhas não conferem.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Processando...';
    errorMessage.classList.add('hidden');

    try {
      // Endpoint que mapeia para o seu RecoverPasswordEmailRequestDTO record
      const response = await fetch('/api/users/recover-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password, passwordConfirmation })
      });

      if (response.ok) {
        alert('Senha alterada com sucesso!');
        window.location.href = '/api/web/login';
      } else {
        const data = await response.text();
        showError(data || 'Erro ao redefinir senha. O link pode ter expirado.');
      }
    } catch (error) {
      showError('Erro de conexão com o servidor.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Atualizar Senha';
    }
  });

  function showError(msg) {
    errorMessage.textContent = msg;
    errorMessage.classList.remove('hidden');
  }

  // Lógica do Dark Mode
  const themeToggleBtn = document.getElementById('theme-toggle');
  const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
  const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

  if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
      themeToggleLightIcon.classList.remove('hidden');
  } else {
      document.documentElement.classList.remove('dark');
      themeToggleDarkIcon.classList.remove('hidden');
  }

  themeToggleBtn.addEventListener('click', function() {
      themeToggleDarkIcon.classList.toggle('hidden');
      themeToggleLightIcon.classList.toggle('hidden');
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
  });
</script>
</body>
</html>
