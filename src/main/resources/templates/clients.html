<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes | Brevus Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/auth-utils.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }

    // Inicialização do tema
    if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    }

    // Proteção de Rota
    if (!AuthUtils.isAuthenticated() || !AuthUtils.hasRole('ADMIN')) {
        window.location.href = '/api/web/login';
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen transition-colors duration-300">

<nav class="bg-white dark:bg-slate-800 shadow-md sticky top-0 z-50 transition-colors">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
    <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='/api/web/home-manager'">
      <div class="bg-indigo-600 p-2 rounded-lg text-white">
        <i class="fa-solid fa-arrow-left"></i>
      </div>
      <span class="text-xl font-bold text-slate-800 dark:text-white">Gestão de <span class="text-indigo-600">Clientes</span></span>
    </div>

    <div class="flex items-center gap-4">
      <button id="theme-toggle" class="p-2.5 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:ring-2 hover:ring-indigo-500 transition-all">
        <i id="theme-toggle-dark-icon" class="hidden fa-solid fa-moon"></i>
        <i id="theme-toggle-light-icon" class="hidden fa-solid fa-sun"></i>
      </button>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <div class="mb-6 flex flex-wrap justify-between items-center gap-4">
    <div>
      <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Base de Usuários</h2>
      <p class="text-slate-500 dark:text-slate-400 text-sm">Visualize e gerencie as contas registradas.</p>
    </div>
    <div class="relative w-full max-w-xs">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
      <input type="text" id="searchInput" oninput="searchClients()" placeholder="Buscar por nome ou e-mail..."
             class="w-full pl-10 pr-4 py-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
  </div>

  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden transition-colors">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-50 dark:bg-slate-700/50">
        <tr>
          <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Cliente</th>
          <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Contato</th>
          <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Cadastro</th>
          <th class="px-6 py-4 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider text-right">Ações</th>
        </tr>
        </thead>
        <tbody id="clientTableBody" class="divide-y divide-slate-100 dark:divide-slate-700">
        </tbody>
      </table>
    </div>

    <div class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 flex items-center justify-between">
      <span id="pageInfo" class="text-sm text-slate-500 dark:text-slate-400">Página 1 de 10</span>
      <div class="flex gap-2">
        <button id="prevPage" onclick="changePage(-1)" class="px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-indigo-600 disabled:opacity-50 transition-colors">Anterior</button>
        <button id="nextPage" onclick="changePage(1)" class="px-4 py-2 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-indigo-600 disabled:opacity-50 transition-colors">Próxima</button>
      </div>
    </div>
  </div>
</main>

<div id="detailsModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
  <div class="bg-white dark:bg-slate-800 w-full max-w-lg rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden">
    <div class="p-8 text-center relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>

      <div class="w-20 h-20 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-full flex items-center justify-center text-3xl font-bold mx-auto mb-4" id="modalInitial">U</div>
      <h3 id="modalName" class="text-2xl font-black text-slate-800 dark:text-white">Nome do Usuário</h3>
      <span id="modalRoles" class="text-xs font-bold bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 px-3 py-1 rounded-full uppercase">Client</span>
    </div>

    <div class="px-8 pb-8 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div class="p-4 bg-slate-50 dark:bg-slate-700/30 rounded-2xl">
          <p class="text-[10px] uppercase font-bold text-slate-400">E-mail</p>
          <p id="modalEmail" class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate"></p>
        </div>
        <div class="p-4 bg-slate-50 dark:bg-slate-700/30 rounded-2xl">
          <p class="text-[10px] uppercase font-bold text-slate-400">Telefone</p>
          <p id="modalPhone" class="text-sm font-medium text-slate-700 dark:text-slate-200"></p>
        </div>
        <div class="p-4 bg-slate-50 dark:bg-slate-700/30 rounded-2xl">
          <p class="text-[10px] uppercase font-bold text-slate-400">Nascimento</p>
          <p id="modalBirth" class="text-sm font-medium text-slate-700 dark:text-slate-200"></p>
        </div>
        <div class="p-4 bg-slate-50 dark:bg-slate-700/30 rounded-2xl">
          <p class="text-[10px] uppercase font-bold text-slate-400">Desde</p>
          <p id="modalRegistered" class="text-sm font-medium text-slate-700 dark:text-slate-200"></p>
        </div>
      </div>
      <div class="p-4 bg-slate-900 dark:bg-indigo-900/20 rounded-2xl text-white">
        <p class="text-[10px] uppercase font-bold opacity-60">ID do Sistema</p>
        <p id="modalId" class="text-[10px] font-mono"></p>
      </div>
    </div>
  </div>
</div>

<script>
  let currentPage = 0;
  const pageSize = 10;
  let searchQuery = '';

  // Lógica de Busca e Paginação
  async function loadClients() {
      try {
          const url = `/api/users?page=${currentPage}&size=${pageSize}&search=${searchQuery}`;
          const res = await AuthUtils.authenticatedFetch(url);
          const data = await res.json(); // Espera um Page<User> do Spring

          renderTable(data.content);
          updatePaginationUI(data);
      } catch (e) { console.error("Erro ao carregar clientes", e); }
  }

  function renderTable(clients) {
      const tbody = document.getElementById('clientTableBody');
      tbody.innerHTML = clients.map(user => `
          <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
              <td class="px-6 py-4">
                  <div class="flex items-center gap-3">
                      <div class="w-9 h-9 bg-slate-200 dark:bg-slate-700 rounded-full flex items-center justify-center font-bold text-slate-600 dark:text-slate-300">
                          ${user.name.charAt(0)}
                      </div>
                      <div>
                          <p class="text-sm font-bold text-slate-800 dark:text-white">${user.name}</p>
                          <p class="text-xs text-slate-500 truncate max-w-[150px]">${user.email}</p>
                      </div>
                  </div>
              </td>
              <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">
                  <i class="fa-solid fa-phone text-[10px] mr-1"></i> ${user.phone}
              </td>
              <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-400">
                  ${user.dateRegistered}
              </td>
              <td class="px-6 py-4 text-right">
                  <button onclick='showDetails(${JSON.stringify(user)})'
                          class="bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-600 hover:text-white transition-all">
                      Detalhes
                  </button>
              </td>
          </tr>
      `).join('');
  }

  function updatePaginationUI(pageData) {
      document.getElementById('pageInfo').textContent = `Página ${pageData.number + 1} de ${pageData.totalPages}`;
      document.getElementById('prevPage').disabled = pageData.first;
      document.getElementById('nextPage').disabled = pageData.last;
  }

  function changePage(step) {
      currentPage += step;
      loadClients();
  }

  function searchClients() {
      searchQuery = document.getElementById('searchInput').value;
      currentPage = 0;
      loadClients();
  }

  function showDetails(user) {
      document.getElementById('modalName').textContent = user.name;
      document.getElementById('modalEmail').textContent = user.email;
      document.getElementById('modalPhone').textContent = user.phone;
      document.getElementById('modalBirth').textContent = user.dateBirth;
      document.getElementById('modalRegistered').textContent = user.dateRegistered;
      document.getElementById('modalId').textContent = user.id;
      document.getElementById('modalInitial').textContent = user.name.charAt(0);

      // Roles formatadas
      const roles = user.userRoles.map(r => r.role).join(' / ');
      document.getElementById('modalRoles').textContent = roles;

      document.getElementById('detailsModal').classList.remove('hidden');
  }

  function closeModal() {
      document.getElementById('detailsModal').classList.add('hidden');
  }

  // --- LÓGICA DE TEMA ---
  const themeToggleBtn = document.getElementById('theme-toggle');
  const darkIcon = document.getElementById('theme-toggle-dark-icon');
  const lightIcon = document.getElementById('theme-toggle-light-icon');

  function updateIcons() {
      if (document.documentElement.classList.contains('dark')) {
          lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
      } else {
          darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
      }
  }

  themeToggleBtn.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      updateIcons();
  });

  // Inicialização
  updateIcons();
  loadClients();
</script>
</body>
</html>
