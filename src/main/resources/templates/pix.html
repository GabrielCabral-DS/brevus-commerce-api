<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX | Brevus Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/js/auth-utils.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        /* Ajuste para o QR Code gerado pela biblioteca ficar responsivo */
        #qrcode img { margin: 0 auto; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 antialiased min-h-screen">

<nav class="p-6 flex justify-between items-center max-w-5xl mx-auto">
    <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-600/20">
            <i data-lucide="shopping-bag" class="text-white w-6 h-6"></i>
        </div>
        <span class="font-black text-xl tracking-tight dark:text-white uppercase">Brevus<span class="text-emerald-600">.</span></span>
    </div>
    <button id="theme-toggle" class="p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
        <i data-lucide="moon" id="theme-toggle-dark-icon" class="w-5 h-5"></i>
        <i data-lucide="sun" id="theme-toggle-light-icon" class="w-5 h-5 hidden"></i>
    </button>
</nav>

<main class="max-w-4xl mx-auto px-4 py-8 grid md:grid-cols-2 gap-8 items-start">

    <div class="space-y-6">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none">
            <h1 class="text-3xl font-black mb-2 dark:text-white">Pagamento PIX</h1>
            <p class="text-slate-500 mb-8">Finalize sua compra escaneando o código.</p>

            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
                    <span class="text-sm font-medium text-slate-500">Pedido</span>
                    <span id="displaySaleId" class="font-mono font-bold text-emerald-600 uppercase">---</span>
                </div>
                <div class="flex justify-between items-center p-4 bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl border border-emerald-100 dark:border-emerald-900/30">
                    <span class="text-sm font-medium text-emerald-800 dark:text-emerald-400">Total</span>
                    <span id="displayTotal" class="text-2xl font-black text-emerald-600 dark:text-emerald-400">R$ 0,00</span>
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="confirmPayment()" class="w-full bg-slate-900 dark:bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="check-circle" class="w-5 h-5"></i> Já realizei o pagamento
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-3xl border border-slate-100 dark:border-slate-800 shadow-xl overflow-hidden">
        <div class="p-8 flex flex-col items-center text-center">

            <div id="qrcode" class="bg-white p-4 rounded-2xl border border-slate-100 mb-6 transition-all">
            </div>

            <div class="flex items-center gap-2 text-emerald-600 bg-emerald-50 dark:bg-emerald-900/30 px-4 py-2 rounded-full mb-8">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                <span class="text-xs font-bold uppercase tracking-widest">Aguardando PIX</span>
            </div>

            <div class="w-full space-y-3">
                <p class="text-xs font-bold text-slate-400 uppercase text-left ml-1">Copia e Cola</p>
                <div class="relative group">
                    <input type="text" id="pixCopiaEColaInput" readonly
                           class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl px-5 py-4 text-xs font-mono pr-14 focus:outline-none"
                           value="Carregando...">
                    <button onclick="copyPixCode()" class="absolute right-2 top-1/2 -translate-y-1/2 p-3 bg-white dark:bg-slate-700 hover:bg-emerald-600 hover:text-white rounded-xl transition-all shadow-sm">
                        <i data-lucide="copy" class="w-4 h-4" id="copyIcon"></i>
                        <i data-lucide="check" class="w-4 h-4 hidden" id="checkIcon"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 dark:bg-slate-800/50 p-6 flex justify-between items-center border-t border-slate-100 dark:border-slate-800">
                <span class="text-xs font-medium text-slate-500 flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i> Expira em 30 min
                </span>
            <img src="https://logopng.com.br/logos/pix-106.png" class="h-4 grayscale opacity-50 dark:invert">
        </div>
    </div>
</main>

<script>
    lucide.createIcons();

    function initPixPage() {
        const params = new URLSearchParams(window.location.search);
        const saleId = params.get('saleId');
        const qrCodeRaw = params.get('qrCode');

        if (saleId) document.getElementById('displaySaleId').textContent = `#${saleId}`;

        if (qrCodeRaw) {
            try {
                const data = JSON.parse(decodeURIComponent(qrCodeRaw));

                if (data.pixCopiaECola) {
                    document.getElementById('pixCopiaEColaInput').value = data.pixCopiaECola;

                    // Gerar QR Code Localmente
                    new QRCode(document.getElementById("qrcode"), {
                        text: data.pixCopiaECola,
                        width: 224,
                        height: 224,
                        colorDark : "#0f172a",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.M
                    });
                }

                if (data.valor && data.valor.original) {
                    const val = parseFloat(data.valor.original);
                    document.getElementById('displayTotal').textContent = val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                }
            } catch (e) {
                console.error("Erro no processamento:", e);
            }
        }
    }

    function copyPixCode() {
        const input = document.getElementById('pixCopiaEColaInput');
        const copyIcon = document.getElementById('copyIcon');
        const checkIcon = document.getElementById('checkIcon');

        input.select();
        navigator.clipboard.writeText(input.value);

        copyIcon.classList.add('hidden');
        checkIcon.classList.remove('hidden');
        setTimeout(() => {
            copyIcon.classList.remove('hidden');
            checkIcon.classList.add('hidden');
        }, 2000);
    }

    // Lógica de Tema
    const themeBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    themeBtn.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('color-theme', isDark ? 'dark' : 'light');
        darkIcon.classList.toggle('hidden', isDark);
        lightIcon.classList.toggle('hidden', !isDark);
    });

    if (document.documentElement.classList.contains('dark')) {
        darkIcon.classList.add('hidden');
        lightIcon.classList.remove('hidden');
    }

    function confirmPayment() {
        window.location.href = "/api/web/my-orders";
    }

    document.addEventListener('DOMContentLoaded', initPixPage);
</script>
</body>
</html>
